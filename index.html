<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaApps</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

header{
background:#22c55e;
color:white;
padding:15px;
font-size:28px;
font-weight:bold;
text-align:center;
}

.search{
padding:15px;
}

.search input{
width:100%;
padding:12px;
border-radius:30px;
border:none;
font-size:16px;
}

.card{
background:white;
margin:15px;
padding:15px;
border-radius:15px;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.top{
display:flex;
align-items:center;
}

.logo{
width:70px;
height:70px;
border-radius:18px;
margin-right:15px;
}

.info h2{
margin:0;
}

.rating{
color:#ff9800;
font-size:18px;
margin-top:5px;
}

.btn{
display:inline-block;
background:#22c55e;
color:white;
padding:12px 30px;
border-radius:10px;
text-decoration:none;
font-size:18px;
margin-top:15px;
}

.shots{
display:flex;
overflow-x:auto;
gap:10px;
margin-top:20px;
}

.shots img{
height:180px;
border-radius:12px;
}
</style>

</head>

<body>

<header>🚀 NovaApps</header>

<div class="search">
<input type="text" placeholder="Search Apps">
</div>

<div class="card">

<div class="top">

<img src="logo.png" class="logo">

<div class="info">

<h2>CapCut</h2>

<div class="rating">⭐ 4.8</div>

<p>Professional Video Editor</p>

</div>

</div>

<a href="capcut.apk" class="btn" download>📥 Download APK</a>

<div class="shots">

<img src="1.jpg">

<img src="2.jpg">

<img src="3.jpg">

<img src="4.jpg">

<img src="5.jpg">

</div>

</div>

</body>
</html>
